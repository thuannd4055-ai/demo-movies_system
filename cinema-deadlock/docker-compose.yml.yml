version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cinema_postgres
    environment:
      POSTGRES_DB: cinema_db
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
    ports:
      - "5432:5432"
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d cinema_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cinema_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cinema_db
      DB_USER: cinema_user
      DB_PASSWORD: cinema_pass
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cinema_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
